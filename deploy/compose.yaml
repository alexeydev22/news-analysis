services:
  api-gateway:
    build:
      context: ..
      dockerfile: deploy/docker/api-gateway.Dockerfile
    env_file:
      - ../.env.example
    environment:
      API_GATEWAY_ANALYSIS_SERVICE_URL: "http://analysis-service:8000"
      API_GATEWAY_RETRIEVAL_SERVICE_URL: "http://retrieval-service:8000"
      API_GATEWAY_DIALOG_SERVICE_URL: "http://dialog-service:8000"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant
      - analysis-service
      - retrieval-service
      - dialog-service

  analysis-service:
    build:
      context: ..
      dockerfile: deploy/docker/analysis-service.Dockerfile
    env_file:
      - ../.env.example
    environment:
      ANALYSIS_USE_STATIC_CLASSIFIER: "${ANALYSIS_USE_STATIC_CLASSIFIER:-true}"
      ANALYSIS_TFIDF_ARTIFACT_PATH: "${ANALYSIS_TFIDF_ARTIFACT_PATH:-artifacts/models/baseline/tfidf-logreg.joblib}"
      ANALYSIS_EMBEDDING_ARTIFACT_PATH: "${ANALYSIS_EMBEDDING_ARTIFACT_PATH:-artifacts/models/embedding/embedding-logreg.joblib}"
      ANALYSIS_TRANSFORMER_ARTIFACT_PATH: "${ANALYSIS_TRANSFORMER_ARTIFACT_PATH:-artifacts/models/transformer/tiny-transformer-classifier.joblib}"
      HF_HOME: "${HF_HOME:-/app/artifacts/hf-cache}"
      HF_HUB_OFFLINE: "${HF_HUB_OFFLINE:-1}"
      TRANSFORMERS_OFFLINE: "${TRANSFORMERS_OFFLINE:-1}"
    ports:
      - "8001:8000"
    volumes:
      - ../artifacts:/app/artifacts:ro
      - ../artifacts/hf-cache:/app/artifacts/hf-cache

  retrieval-service:
    build:
      context: ..
      dockerfile: deploy/docker/retrieval-service.Dockerfile
    env_file:
      - ../.env.example
    environment:
      RETRIEVAL_QDRANT_URL: "http://qdrant:6333"
      RETRIEVAL_USE_STATIC_EMBEDDINGS: "${RETRIEVAL_USE_STATIC_EMBEDDINGS:-true}"
      RETRIEVAL_EMBEDDING_MODEL_NAME: "${RETRIEVAL_EMBEDDING_MODEL_NAME:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}"
    ports:
      - "8002:8000"
    depends_on:
      - qdrant

  dialog-service:
    build:
      context: ..
      dockerfile: deploy/docker/dialog-service.Dockerfile
    env_file:
      - ../.env.example
    environment:
      DIALOG_GENERATOR_KIND: "${DIALOG_GENERATOR_KIND:-template}"
      DIALOG_LLM_BASE_URL: "${DIALOG_LLM_BASE_URL:-http://host.docker.internal:8080}"
      DIALOG_LLM_MODEL: "${DIALOG_LLM_MODEL:-Qwen3-0.6B-Instruct-GGUF}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8003:8000"

  news-service:
    build:
      context: ..
      dockerfile: deploy/docker/news-service.Dockerfile
    env_file:
      - ../.env.example
    environment:
      NEWS_SERVICE_RETRIEVAL_SERVICE_URL: "http://retrieval-service:8000"
      NEWS_SERVICE_NEWS_DATASET_PATH: "${NEWS_SERVICE_NEWS_DATASET_PATH:-data/raw/economic_news.csv}"
      NEWS_SERVICE_DATASET_UPLOAD_DIR: "${NEWS_SERVICE_DATASET_UPLOAD_DIR:-data/uploads}"
      NEWS_SERVICE_ACTIVE_DATASET_FILE: "${NEWS_SERVICE_ACTIVE_DATASET_FILE:-data/uploads/active_dataset.json}"
      NEWS_SERVICE_UPLOAD_MAX_BYTES: "${NEWS_SERVICE_UPLOAD_MAX_BYTES:-52428800}"
    ports:
      - "8004:8000"
    volumes:
      - ../data/raw:/app/data/raw:ro
      - news_uploads:/app/data/uploads
    depends_on:
      - retrieval-service

  news-worker:
    build:
      context: ..
      dockerfile: deploy/docker/news-service.Dockerfile
    env_file:
      - ../.env.example
    environment:
      NEWS_SERVICE_RETRIEVAL_SERVICE_URL: "http://retrieval-service:8000"
      NEWS_SERVICE_NEWS_DATASET_PATH: "${NEWS_SERVICE_NEWS_DATASET_PATH:-data/raw/economic_news.csv}"
      NEWS_SERVICE_DATASET_UPLOAD_DIR: "${NEWS_SERVICE_DATASET_UPLOAD_DIR:-data/uploads}"
      NEWS_SERVICE_ACTIVE_DATASET_FILE: "${NEWS_SERVICE_ACTIVE_DATASET_FILE:-data/uploads/active_dataset.json}"
      NEWS_SERVICE_UPLOAD_MAX_BYTES: "${NEWS_SERVICE_UPLOAD_MAX_BYTES:-52428800}"
      NEWS_SERVICE_REDIS_URL: "redis://redis:6379/0"
    command:
      - .venv/bin/taskiq
      - worker
      - news_service.workers.broker:broker
      - news_service.workers.tasks
      - --workers
      - "1"
    volumes:
      - ../data/raw:/app/data/raw:ro
      - news_uploads:/app/data/uploads
    depends_on:
      - redis
      - retrieval-service

  frontend-web:
    build:
      context: ..
      dockerfile: deploy/docker/frontend-web.Dockerfile
      args:
        VITE_API_GATEWAY_URL: "${VITE_API_GATEWAY_URL:-/api-gateway}"
        VITE_NEWS_SERVICE_URL: "${VITE_NEWS_SERVICE_URL:-/news-service}"
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
      - news-service

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: economic_news
      POSTGRES_USER: economic_news
      POSTGRES_PASSWORD: economic_news
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.17.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

volumes:
  postgres_data:
  qdrant_data:
  mlflow_data:
  news_uploads:
