[project]
name = "economic-news-framework"
version = "0.1.0"
description = "Shared technical framework for the economic news dialog system"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115",
  "dishka>=1.4",
  "pydantic-settings>=2.6",
  "structlog>=24.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
